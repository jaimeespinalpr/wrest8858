name: Apply mobile plans section editor

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-plans-mobile-section-editor.yml'
      - '.github/workflows/.apply-plans-mobile-section-editor-trigger'

permissions:
  contents: write

jobs:
  apply-mobile-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch plans route to load mobile editor
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('plans/index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '<script src="../plans-section-editor-fix.js?v=20260526-section-editor1"></script>',
              '<script src="../plans-section-editor-mobile-fix.js?v=20260526-mobile-section-editor1"></script>'
          )
          if 'plans-section-editor-mobile-fix.js' not in text:
              text = text.replace('</body>', '  <script src="../plans-section-editor-mobile-fix.js?v=20260526-mobile-section-editor1"></script>\n</body>')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit fix if changed
        run: |
          if git diff --quiet -- plans/index.html; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plans/index.html
          git commit -m "Load mobile-safe section editor on plans route"
          git push

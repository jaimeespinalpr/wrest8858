# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create firebase-config
        run: |
          FIREBASE_API_KEY_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_API_KEY }}" | tr -d '\r\n')"
          FIREBASE_AUTH_DOMAIN_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_AUTH_DOMAIN }}" | tr -d '\r\n')"
          FIREBASE_PROJECT_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_PROJECT_ID }}" | tr -d '\r\n')"
          FIREBASE_STORAGE_BUCKET_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_STORAGE_BUCKET }}" | tr -d '\r\n')"
          FIREBASE_MESSAGING_SENDER_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" | tr -d '\r\n')"
          FIREBASE_APP_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_APP_ID }}" | tr -d '\r\n')"
          FIREBASE_MEASUREMENT_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_MEASUREMENT_ID }}" | tr -d '\r\n')"
          cat <<EOF > firebase-config.js
          window.FIREBASE_CONFIG = {
            apiKey: "${FIREBASE_API_KEY_CLEAN}",
            authDomain: "${FIREBASE_AUTH_DOMAIN_CLEAN}",
            projectId: "${FIREBASE_PROJECT_ID_CLEAN}",
            storageBucket: "${FIREBASE_STORAGE_BUCKET_CLEAN}",
            messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID_CLEAN}",
            appId: "${FIREBASE_APP_ID_CLEAN}",
            measurementId: "${FIREBASE_MEASUREMENT_ID_CLEAN}"
          };
          window.FIREBASE_USERS_COLLECTION = "users";
          EOF
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build public Firebase config (optional)
        run: |
          FIREBASE_API_KEY_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_API_KEY }}" | tr -d '\r\n')"
          FIREBASE_AUTH_DOMAIN_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_AUTH_DOMAIN }}" | tr -d '\r\n')"
          FIREBASE_PROJECT_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_PROJECT_ID }}" | tr -d '\r\n')"
          FIREBASE_STORAGE_BUCKET_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_STORAGE_BUCKET }}" | tr -d '\r\n')"
          FIREBASE_MESSAGING_SENDER_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" | tr -d '\r\n')"
          FIREBASE_APP_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_APP_ID }}" | tr -d '\r\n')"
          FIREBASE_MEASUREMENT_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_MEASUREMENT_ID }}" | tr -d '\r\n')"
          if [ -n "$FIREBASE_API_KEY_CLEAN" ] && [ -n "$FIREBASE_AUTH_DOMAIN_CLEAN" ] && [ -n "$FIREBASE_PROJECT_ID_CLEAN" ] && [ -n "$FIREBASE_STORAGE_BUCKET_CLEAN" ] && [ -n "$FIREBASE_MESSAGING_SENDER_ID_CLEAN" ] && [ -n "$FIREBASE_APP_ID_CLEAN" ]; then
            cat <<EOF > firebase-config.public.js
            window.FIREBASE_CONFIG = {
              apiKey: "${FIREBASE_API_KEY_CLEAN}",
              authDomain: "${FIREBASE_AUTH_DOMAIN_CLEAN}",
              projectId: "${FIREBASE_PROJECT_ID_CLEAN}",
              storageBucket: "${FIREBASE_STORAGE_BUCKET_CLEAN}",
              messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID_CLEAN}",
              appId: "${FIREBASE_APP_ID_CLEAN}",
              measurementId: "${FIREBASE_MEASUREMENT_ID_CLEAN}"
            };

            window.FIREBASE_USERS_COLLECTION = "users";
            window.FIREBASE_SHARED_COLLECTION = "shared_app";
            window.FIREBASE_MEDIA_TREE_DOC = "media_tree";
            window.WPL_MEDIA_UPLOADS_ROOT = "media_uploads";
            window.WPL_MEDIA_BASE_URL = "";
            EOF
            echo "firebase-config.public.js generated from GitHub Secrets."
          else
            echo "Firebase secrets not fully set. Using repository firebase-config.public.js."
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy GH Pages

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Create firebase-config
        if: ${{ secrets.FIREBASE_API_KEY && secrets.FIREBASE_AUTH_DOMAIN && secrets.FIREBASE_PROJECT_ID && secrets.FIREBASE_STORAGE_BUCKET && secrets.FIREBASE_MESSAGING_SENDER_ID && secrets.FIREBASE_APP_ID && secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          FIREBASE_API_KEY_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_API_KEY }}" | tr -d '\r\n')"
          FIREBASE_AUTH_DOMAIN_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_AUTH_DOMAIN }}" | tr -d '\r\n')"
          FIREBASE_PROJECT_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_PROJECT_ID }}" | tr -d '\r\n')"
          FIREBASE_STORAGE_BUCKET_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_STORAGE_BUCKET }}" | tr -d '\r\n')"
          FIREBASE_MESSAGING_SENDER_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" | tr -d '\r\n')"
          FIREBASE_APP_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_APP_ID }}" | tr -d '\r\n')"
          FIREBASE_MEASUREMENT_ID_CLEAN="$(printf '%s' "${{ secrets.FIREBASE_MEASUREMENT_ID }}" | tr -d '\r\n')"
          cat <<EOF > firebase-config.js
          window.FIREBASE_CONFIG = {
            apiKey: "${FIREBASE_API_KEY_CLEAN}",
            authDomain: "${FIREBASE_AUTH_DOMAIN_CLEAN}",
            projectId: "${FIREBASE_PROJECT_ID_CLEAN}",
            storageBucket: "${FIREBASE_STORAGE_BUCKET_CLEAN}",
            messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID_CLEAN}",
            appId: "${FIREBASE_APP_ID_CLEAN}",
            measurementId: "${FIREBASE_MEASUREMENT_ID_CLEAN}"
          };
          window.FIREBASE_USERS_COLLECTION = "users";
          EOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
